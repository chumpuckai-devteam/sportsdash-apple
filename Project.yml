name: SportsDash
options:
  bundleIdPrefix: com.sportsdash
  deploymentTarget:
    iOS: "17.0"
    tvOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

# FFmpeg-backed player (same stack used by UHF and other IPTV apps).
# GPL license — see KSPlayer README. Default engine prefers FFmpeg for messy live streams.
packages:
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer.git
    branch: main

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_CFBundleDisplayName: SportsDash
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
    INFOPLIST_KEY_CFBundleIconName: AppIcon
    # Static system launch screen (before SwiftUI) — matches void black + logo
    INFOPLIST_KEY_UILaunchScreen_UIColorName: LaunchBackground
    INFOPLIST_KEY_UILaunchScreen_UIImageName: AppLogo
    # IPTV providers often use HTTP
    INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
    # Background audio while locked / switching apps
    INFOPLIST_KEY_UIBackgroundModes: "audio"
    # Personal Team (Samir Patel) — keeps signing after xcodegen regenerate
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "2H57Y8GR9D"
    # Xcode recommended project settings
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    DEAD_CODE_STRIPPING: YES

targets:
  SportsDash:
    type: application
    platform: iOS
    sources:
      - path: SportsDash
        excludes:
          - "**/.DS_Store"
          - "**/*.xcassets"
    resources:
      - path: SportsDash/Assets.xcassets
    dependencies:
      - package: KSPlayer
        product: KSPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samirpatel.sportsdash.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "2H57Y8GR9D"
        # FFmpegKit binary modules
        OTHER_LDFLAGS: "$(inherited) -ObjC"
    scheme:
      testTargets: []

  SportsDashTV:
    type: application
    platform: tvOS
    sources:
      - path: SportsDash
        excludes:
          - "**/.DS_Store"
          - "**/*.xcassets"
    resources:
      - path: SportsDash/Assets.xcassets
    dependencies:
      - package: KSPlayer
        product: KSPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samirpatel.sportsdash.tvos
        TARGETED_DEVICE_FAMILY: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "2H57Y8GR9D"
        OTHER_LDFLAGS: "$(inherited) -ObjC"
    scheme:
      testTargets: []
