name: SportsDash
options:
  bundleIdPrefix: com.sportsdash
  deploymentTarget:
    iOS: "17.0"
    tvOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

# Official VideoLAN VLCKit binaries via SPM (same MobileVLCKit/TVVLCKit as CocoaPods).
# Avoids CocoaPods [CP] Embed rsync + Xcode User Script Sandbox failures.
#   xcodegen generate && open SportsDash.xcodeproj
packages:
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm
    from: "3.6.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_CFBundleDisplayName: SportsDash
    INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
    INFOPLIST_KEY_UIBackgroundModes: "audio"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "2H57Y8GR9D"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    DEAD_CODE_STRIPPING: YES

targets:
  SportsDash:
    type: application
    platform: iOS
    sources:
      - path: SportsDash
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: VLCKitSPM
        product: VLCKitSPM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samirpatel.sportsdash.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "2H57Y8GR9D"
        OTHER_LDFLAGS: "$(inherited) -ObjC"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    scheme:
      testTargets: []

  SportsDashTV:
    type: application
    platform: tvOS
    sources:
      - path: SportsDash
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: VLCKitSPM
        product: VLCKitSPM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samirpatel.sportsdash.tvos
        TARGETED_DEVICE_FAMILY: "3"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "2H57Y8GR9D"
        OTHER_LDFLAGS: "$(inherited) -ObjC"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    scheme:
      testTargets: []
