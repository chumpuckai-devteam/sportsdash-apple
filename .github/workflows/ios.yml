name: iOS build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install tools
        run: |
          brew install xcodegen cocoapods
      - name: Generate project + pods
        run: |
          xcodegen generate
          pod install --repo-update
      - name: Build iOS
        run: |
          xcodebuild \
            -workspace SportsDash.xcworkspace \
            -scheme SportsDash \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
